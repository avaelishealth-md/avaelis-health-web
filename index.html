<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AvaElis Health</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="AvaElis Health — precision wellness & longevity medicine. Site in progress." />
  <style>
    :root { --ink:#1b2a2e; --muted:#5b6f73; --line:#dfe7e5; --bg:#f6f8f7; --accent:#0e6b5c; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--bg);
      display: grid; place-items: center; text-align: center; padding: 2rem;
    }
    .wrap { max-width: 560px; }
    .mark { letter-spacing: .22em; text-transform: uppercase; font-size: .78rem; color: var(--accent); font-weight: 600; }
    h1 { font-size: clamp(2.1rem, 6vw, 3.2rem); font-weight: 600; margin: .5rem 0 .25rem; letter-spacing: -.01em; }
    .tag { color: var(--muted); font-size: 1.05rem; margin: 0 0 1.75rem; }
    .pill { display:inline-block; border:1px solid var(--line); border-radius:999px; padding:.45rem 1rem; font-size:.85rem; color:var(--muted); background:#fff; }
    footer { margin-top: 2.25rem; font-size: .78rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark">AvaElis&nbsp;Health</div>
    <h1>Precision wellness, in progress.</h1>
    <p class="tag">Longevity &amp; preventative medicine with Dr&nbsp;Danny&nbsp;Cai.</p>
    <span class="pill">● Site coming soon — mock deployment</span>
    <footer>Placeholder · replaced once the design lands.</footer>
  </main>
</body>
</html>
